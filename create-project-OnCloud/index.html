<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Create Project Space</title>

<style>
body {
    font-family: Arial, sans-serif;
    padding: 10px;
}

input {
    width: 95%;
    padding: 8px;
    margin-bottom: 10px;
}

button {
    padding: 8px 15px;
}

#result {
    margin-top: 15px;
    font-weight: bold;
}
</style>

<script>

widget.addEvent("onLoad", function () {

    console.log("Widget Loaded");

    widget.body.innerHTML =
        '<h3>Create Project Space</h3>' +
        '<input id="projectName" placeholder="Project Name"><br>' +
        '<input id="projectDescription" placeholder="Description"><br>' +
        '<button id="createBtn">Create Project</button>' +
        '<div id="result"></div>';

    setTimeout(function () {

        document.getElementById("createBtn").onclick = createProject;

    }, 500);

});

function createProject() {

    console.log("Create Project Clicked");

    require(
        [
            "DS/WAFData/WAFData",
            "DS/i3DXCompassServices/i3DXCompassServices"
        ],
        function (
            WAFData,
            CompassServices
        ) {

            console.log("Modules Loaded");

            CompassServices.getPlatformServices({

                platformId:widget.getValue("x3dPlatformId"),

                onComplete: function (services) {

                    console.log("Services Received");
                    console.log(services);

                    var spaceUrl =services["3DSpace"];

                    console.log("3DSpace URL:");
                    console.log(spaceUrl);

                    var csrfUrl =spaceUrl +"/resources/v1/application/CSRF";

                    console.log("CSRF URL:");
                    console.log(csrfUrl);

                    WAFData.authenticatedRequest(
                        csrfUrl,
                        {
                            method: "GET",
                            type: "json",

                            onComplete:
                                function (csrfResponse) {
                                    console.log("CSRF SUCCESS");
                                    console.log(csrfResponse);
                                    
                                    var csrfToken =csrfResponse.csrf.value;
                                    console.log("CSRF TOKEN:");
                                    console.log(csrfToken);
                                    createProjectRequest(WAFData,spaceUrl,csrfToken);
                                },

                            onFailure:
                                function (error) {
                                    console.log("CSRF FAILED");
                                    console.log(error);
                                    document.getElementById("result").innerHTML ="CSRF FAILED";
                                }
                        }
                    );

                },

                onFailure: function (error) {
                    console.log( "SERVICE DISCOVERY FAILED");
                    console.log(error);
                }

            });

        }
    );

}

function createProjectRequest(
    WAFData,
    spaceUrl,
    csrfToken
) {

    var payload = {
        data: [
            {
                type: "Project Space",
                dataelements: {
                    title:document.getElementById("projectName").value,
                    description: document.getElementById("projectDescription").value
                }
            }
        ]
    };

    console.log("PAYLOAD:");
    console.log(JSON.stringify(payload,null,2));

    var projectUrl =spaceUrl +"/resources/v1/modeler/projects";

    console.log("PROJECT URL:");
    console.log(projectUrl);

    WAFData.authenticatedRequest(
        projectUrl,
        {
            method: "POST",
            type: "json",
            headers: {
                "Content-Type":"application/json",
                "Accept":"application/json",
                "ENO_CSRF_TOKEN":csrfToken
            },

            data:
                JSON.stringify( payload),

            onComplete:
                function (response) {
                console.log("PROJECT CREATED");

                console.log("FULL RESPONSE:");
                console.log(JSON.stringify(response,null,2));

                if(response.data && response.data.length){
                    console.log("Project ID : "+ response.data[0].id);
                    console.log("Project Name : "+ response.data[0].identifier);
                    }

                document.getElementById("result").innerHTML =
                "<b style='color:green'>Project Created Successfully</b>";
                  
                },

            onFailure:
                function (error) {
                    console.log("PROJECT FAILED");
                    console.log(error);
                    document.getElementById( "result").innerHTML ="PROJECT FAILED";
                }

        }
    );

}

</script>

</head>

<body>
</body>
</html>
